<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Space typing game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-wrap">
    <header class="hud">
      <div class="left">
        <div class="stat">Lives: <span id="lives">3</span></div>
        <div class="stat">Level: <span id="level">1</span></div>
      </div>
      <div class="center">
        <h1>Space typing game</h1>
        <div class="subtitle">Type the words to blast enemies!</div>
      </div>
      <div class="right">
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat">Active: <span id="active">0</span></div>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="960" height="540"></canvas>
    </div>

    <div class="controls">
      <input id="typing" autocomplete="off" placeholder="Type here..." />
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div id="message" class="message hidden"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
